spring.application.name=caboolo

server.address=0.0.0.0
spring.datasource.url=jdbc:mysql://localhost:3306/caboolo?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.pool-name=CabooloHikariPool
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Spring Boot Actuator Configuration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Lettuce Connection Pool
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-wait=2000ms

# Storage provider change to "s3" (and add a new StorageService impl) to switch providers
storage.provider=cloudinary

# Cloudinary Configuration
cloudinary.cloud-name=your_cloud_name
cloudinary.api-key=your_api_key
cloudinary.api-secret=your_api_secret

#swagger configuration
springdoc.swagger-ui.path=/swagger-ui.html

logging.file.name=logs/caboolo.log
# Logging Configuration
logging.level.com.caboolo.backend=DEBUG
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
# Logging use IST (UTC+5:30) for log timestamps
logging.pattern.dateformat=dd/MM/yyyy HH:mm:ss.SSS z
spring.jackson.time-zone=Asia/Kolkata
logging.pattern.console=%d{dd/MM/yyyy HH:mm:ss.SSS, Asia/Kolkata} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{dd/MM/yyyy HH:mm:ss.SSS, Asia/Kolkata} [%thread] %-5level %logger{36} - %msg%n

# Multipart file upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB