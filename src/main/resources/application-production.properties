# OCI MySQL Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# HikariCP Connection Pool (production)
spring.datasource.hikari.pool-name=CabooloHikariPool
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# OCI Redis Database configuration
spring.data.redis.url=${REDIS_URL}

# Lettuce Connection Pool (production)
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-idle=20
spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-wait=3000

# Storage provider
storage.provider=cloudinary

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# AviationStack API
aviationstack.api-key=${FLIGHT_VERIFICATION_API_KEY}
aviationstack.base-url=${FLIGHT_VERIFICATION_BASE_URL}

# Production Logging Configuration
logging.level.com.caboolo.backend=INFO
logging.file.name=logs/caboolo.log
logging.logback.rollingpolicy.max-file-size=50MB
logging.logback.rollingpolicy.max-history=30