spring.datasource.url=jdbc:mysql://10.0.0.38:3306/caboolo?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true
spring.datasource.username=caboolo
spring.datasource.password=Caboolo@2026
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update

# HikariCP Connection Pool (local/dev)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# AviationStack API
aerodatabox.api-key=${FLIGHT_VERIFICATION_API_KEY}
aerodatabox.base-url=${FLIGHT_VERIFICATION_BASE_URL}

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=60000

# Lettuce Connection Pool (local/dev)
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-wait=1000ms

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry=${JWT_ACCESS_TOKEN_EXPIRY_MS}
jwt.refresh-token-expiry=${JWT_REFRESH_TOKEN_EXPIRY_MS}

# Firebase (for FCM push notifications only — NOT authentication)
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:}

# 2Factor Configuration
twofactor.api-key=${TWO_FACTOR_API_KEY}
twofactor.otp-template-name=${TWO_FACTOR_OTP_TEMPLATE_NAME}

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
