spring.datasource.url=jdbc:mysql://10.0.0.38:3306/caboolo?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true
spring.datasource.username=caboolo
spring.datasource.password=Caboolo@2026
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update

# HikariCP Connection Pool (local/dev)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# AviationStack API
aviationstack.api-key=${FLIGHT_VERIFICATION_API_KEY}
aviationstack.base-url=${FLIGHT_VERIFICATION_BASE_URL}

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=60000

# Lettuce Connection Pool (local/dev)
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-wait=1000ms

# Firebase credentials
firebase.credentials.path=${FIREBASE_CREDENTIAL_PATH}

springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
